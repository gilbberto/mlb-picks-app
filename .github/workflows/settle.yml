name: Settle MLB Picks

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: settle-workflow
  cancel-in-progress: true

jobs:
  settle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pandas numpy scikit-learn xgboost

      - name: Run settlement + Telegram notification
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python settle_and_notify.py

      - name: Commit updated files
        run: |
          git config user.name "MLB Picks Bot"
          git config user.email "bot@mlb-picks.local"
          for f in picks.json game_starts_notified.json predictions_log.json .morning_sent; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --cached --quiet && exit 0
          git commit -m "auto-settle: update picks.json + game starts"
          git pull --rebase -X theirs origin main && git push


