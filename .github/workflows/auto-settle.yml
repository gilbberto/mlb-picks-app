name: Auto-Settle MLB Picks

on:
  schedule:
    # Every 15 minutes during MLB hours (12:00 - 23:00 UTC = 6am-5pm Chihuahua)
    - cron: '*/15 12-23 * * *'
  workflow_dispatch:  # manual trigger

jobs:
  settle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pandas numpy scikit-learn

      - name: Run settlement + Telegram notification
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python settle_and_notify.py

      - name: Commit updated files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "MLB Picks Bot"
          git config user.email "bot@mlb-picks.local"
          git add picks.json game_starts_notified.json predictions_log.json
          git diff --cached --quiet || (git commit -m "auto-settle: update picks.json + game starts" && git push)
