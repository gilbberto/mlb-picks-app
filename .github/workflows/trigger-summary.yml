name: Trigger Summary

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

concurrency:
  group: summary-workflow
  cancel-in-progress: true

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Sync git state
        run: |
          git config user.name "MLB Picks Bot"
          git config user.email "bot@mlb-picks.local"
          git pull --rebase -X theirs origin main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pandas numpy scikit-learn xgboost

      - name: Refresh odds cache
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import requests, json, os, subprocess
          from datetime import datetime
          
          today = datetime.now().strftime("%Y-%m-%d")
          print(f"Health check {today}")
          
          # Check if cache already from today
          try:
              with open(".odds_cache.json") as f:
                  d = json.load(f)
              if d.get("date") == today:
                  print("Cache already from today, skipping")
                  exit(0)
          except:
              pass
          
          api_key = os.environ.get("ODDS_API_KEY", "")
          print("Fetching fresh odds...")
          r = requests.get(f"https://api.the-odds-api.com/v4/sports/baseball_mlb/odds?regions=us&markets=h2h,spreads,totals&oddsFormat=american&apiKey={api_key}", timeout=10)
          if r.status_code != 200:
              print(f"Odds API error {r.status_code}")
              exit(0)
          
          data = r.json()
          with open(".odds_cache.json", "w") as f:
              json.dump({"date": today, "data": data}, f)
          print(f"Updated: {len(data)} games")
          
          # Git commit and push
          subprocess.run(["git", "config", "user.name", "MLB Picks Bot"], check=False)
          subprocess.run(["git", "config", "user.email", "bot@mlb-picks.local"], check=False)
          subprocess.run(["git", "add", ".odds_cache.json"], check=False)
          
          r = subprocess.run(["git", "diff", "--cached", "--quiet"], check=False)
          if r.returncode == 0:
              print("No changes to commit")
              exit(0)
          
          subprocess.run(["git", "commit", "-m", "auto-health: refresh odds"], check=False)
          subprocess.run(["git", "pull", "--rebase", "-X", "theirs", "origin", "main"], check=False)
          subprocess.run(["git", "push"], check=False)
          print("Pushed to GitHub")
          PYEOF

      - name: Run morning summary
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python morning_summary.py

      - name: Commit state
        run: |
          git config user.name "MLB Picks Bot"
          git config user.email "bot@mlb-picks.local"
          for f in .morning_sent; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --cached --quiet && exit 0
          git commit -m "auto-summary: mark morning_sent"
          git pull --rebase -X theirs origin main && git push
