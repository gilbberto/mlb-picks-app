name: Trigger Summary

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

concurrency:
  group: summary-workflow
  cancel-in-progress: true

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Sync git state
        run: |
          git config user.name "MLB Picks Bot"
          git config user.email "bot@mlb-picks.local"
          git pull --rebase -X theirs origin main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pandas numpy scikit-learn xgboost

      - name: Refresh odds cache
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          TODAY=$(TZ='America/Chihuahua' date +%Y-%m-%d)
          echo "Health check $TODAY"
          
          # Check if cache already from today
          CACHE_DATE=$(python3 -c "import json; d=json.load(open('.odds_cache.json')); print(d.get('date',''))" 2>/dev/null || echo "")
          if [ "$CACHE_DATE" = "$TODAY" ]; then
            echo "Cache already from today, skipping"
            exit 0
          fi
          
          echo "Fetching fresh odds..."
          python3 -c "
          import requests, json
          r = requests.get('https://api.the-odds-api.com/v4/sports/baseball_mlb/odds?regions=us&markets=h2h,spreads,totals&oddsFormat=american&apiKey=' + '$ODDS_API_KEY', timeout=10)
          if r.status_code == 200:
              data = r.json()
              cache = {'date': '$TODAY', 'data': data}
              with open('.odds_cache.json', 'w') as f:
                  json.dump(cache, f)
              print(f'Updated: {len(data)} games')
          else:
              print(f'Odds API error: {r.status_code}')
          "
          
          git config user.name "MLB Picks Bot"
          git config user.email "bot@mlb-picks.local"
          git add .odds_cache.json
          git diff --cached --quiet && exit 0
          git commit -m "auto-health: refresh odds"
          git pull --rebase -X theirs origin main
          git push

      - name: Run morning summary
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python morning_summary.py

      - name: Commit state
        run: |
          git config user.name "MLB Picks Bot"
          git config user.email "bot@mlb-picks.local"
          for f in .morning_sent; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --cached --quiet && exit 0
          git commit -m "auto-summary: mark morning_sent"
          git pull --rebase -X theirs origin main && git push
