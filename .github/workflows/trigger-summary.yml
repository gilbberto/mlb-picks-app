name: Trigger Summary

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

concurrency:
  group: summary-workflow
  cancel-in-progress: true

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Sync git state
        run: |
          git config user.name "MLB Picks Bot"
          git config user.email "bot@mlb-picks.local"
          git pull --rebase -X theirs origin main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pandas numpy scikit-learn xgboost

      - name: Run morning summary
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python morning_summary.py

      - name: Commit state
        run: |
          git config user.name "MLB Picks Bot"
          git config user.email "bot@mlb-picks.local"
          for f in .morning_sent; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --cached --quiet && exit 0
          git commit -m "auto-summary: mark morning_sent"
          git push
